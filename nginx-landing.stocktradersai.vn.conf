server {
    listen 80;
    listen [::]:80;

    server_name landing.stocktradersai.vn;

    return 301 https://landing.stocktradersai.vn$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name landing.stocktradersai.vn;

    ssl_certificate /etc/letsencrypt/live/landing.stocktradersai.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/landing.stocktradersai.vn/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/landing;
    index index.html;

    location = / {
        return 302 /ra-mat-web-2026;
    }

    location = /ra-mat-web-2026 {
        try_files /index.html =404;
    }

    location = /sap-ra-mat {
        try_files /index.html =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    # /ra-mat-web-2026 và /sap-ra-mat đều fallback vào cùng Vite SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
